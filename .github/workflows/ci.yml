name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: pytest + ruff + mypy (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint (ruff)
        run: ruff check bench_cleanser tests

      - name: Type check (mypy)
        run: mypy bench_cleanser

      - name: Tests (pytest, offline only)
        # No network is reachable from CI tests; any test that exercises the
        # LLM uses tests.conftest.FakeLLMClient. We do NOT set
        # PYTEST_DISABLE_PLUGIN_AUTOLOAD — pytest-asyncio is loaded via the
        # standard entry-point mechanism (see pyproject.toml dev extras).
        run: pytest tests/ -q --tb=short
