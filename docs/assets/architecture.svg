<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="bench-cleanser architecture: two axes, seven stages, deterministic fusion">
  <title>bench-cleanser pipeline architecture</title>
  <desc>Axis 1 (task contamination) flows through Stages 1–6 deterministic + LLM-assisted analysis; Axis 2 (agent trajectory) is classified per (task, agent); Stage 7 fuses both into a single fairness verdict.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#11172e"/>
    </linearGradient>
    <linearGradient id="axis1Grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f2a52"/>
      <stop offset="100%" stop-color="#22305f"/>
    </linearGradient>
    <linearGradient id="axis2Grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#522b3a"/>
      <stop offset="100%" stop-color="#6b2a3c"/>
    </linearGradient>
    <linearGradient id="fuseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4e3a"/>
      <stop offset="100%" stop-color="#2a7754"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa6c9"/>
    </marker>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" />
    </filter>
    <style>
      .axis-label { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; fill: #c5cce0; }
      .stage-title { font-size: 14px; font-weight: 700; fill: #e7ecff; }
      .stage-sub { font-size: 11px; fill: #b5bdd8; }
      .stage-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; fill: #8a93b5; text-transform: uppercase; }
      .det-tag { fill: #6ad99c; }
      .llm-tag { fill: #f4b266; }
      .verdict-title { font-size: 13px; font-weight: 700; fill: #e7ecff; }
      .verdict-sub { font-size: 10px; fill: #b5bdd8; }
      .title { font-size: 22px; font-weight: 800; fill: #f5f7ff; }
      .subtitle { font-size: 12px; fill: #9aa6c9; }
      .arrow-line { stroke: #9aa6c9; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <text x="32" y="44" class="title">bench-cleanser — dual-axis benchmark contamination pipeline</text>
  <text x="32" y="64" class="subtitle">Axis 1: what is wrong with the task · Axis 2: how did the agent get there · Stage 7: fuse → fairness verdict</text>
  <g transform="translate(1030,32)">
    <rect width="220" height="32" rx="6" fill="#1a223f" stroke="#2a345e"/>
    <circle cx="14" cy="16" r="5" fill="#6ad99c"/>
    <text x="26" y="20" class="stage-sub">deterministic — pure rule engine</text>
  </g>
  <g transform="translate(1030,68)">
    <rect width="220" height="32" rx="6" fill="#1a223f" stroke="#2a345e"/>
    <circle cx="14" cy="16" r="5" fill="#f4b266"/>
    <text x="26" y="20" class="stage-sub">LLM — schema-enforced Pydantic out</text>
  </g>

  <!-- Axis 1 band -->
  <g transform="translate(32,108)">
    <rect width="1216" height="248" rx="14" fill="url(#axis1Grad)" stroke="#2a345e"/>
    <text x="20" y="32" class="axis-label">Axis 1 · Task contamination</text>
    <text x="20" y="50" class="stage-sub">Input: TaskRecord — problem statement, hints, gold patch, F2P/P2P tests, before_repo_set_cmd, requirements, interface</text>

    <!-- Stage cards -->
    <g transform="translate(20,70)">
      <!-- S1 -->
      <g transform="translate(0,0)">
        <rect width="180" height="80" rx="10" fill="#141a36" stroke="#2a345e"/>
        <text x="14" y="22" class="stage-tag det-tag">stage 1 · 1.5 · det</text>
        <text x="14" y="42" class="stage-title">Parse + visit</text>
        <text x="14" y="58" class="stage-sub">patch / test diffs</text>
        <text x="14" y="72" class="stage-sub">repo clone, AST, imports</text>
      </g>
      <!-- S2 -->
      <g transform="translate(192,0)">
        <rect width="180" height="80" rx="10" fill="#141a36" stroke="#2a345e"/>
        <text x="14" y="22" class="stage-tag llm-tag">stage 2 · llm</text>
        <text x="14" y="42" class="stage-title">Intent extraction</text>
        <text x="14" y="58" class="stage-sub">acceptance criteria,</text>
        <text x="14" y="72" class="stage-sub">scope, ambiguity, legitimacy</text>
      </g>
      <!-- S3 -->
      <g transform="translate(384,0)">
        <rect width="180" height="80" rx="10" fill="#141a36" stroke="#2a345e"/>
        <text x="14" y="22" class="stage-tag det-tag">stage 3 · det</text>
        <text x="14" y="42" class="stage-title">Structural diff</text>
        <text x="14" y="58" class="stage-sub">astred-core multilingual AST</text>
        <text x="14" y="72" class="stage-sub">stdlib `ast` fallback</text>
      </g>
      <!-- S4A -->
      <g transform="translate(576,0)">
        <rect width="180" height="80" rx="10" fill="#141a36" stroke="#2a345e"/>
        <text x="14" y="22" class="stage-tag llm-tag">stage 4a · llm</text>
        <text x="14" y="42" class="stage-title">Patch ↔ intent</text>
        <text x="14" y="58" class="stage-sub">per-hunk verdict:</text>
        <text x="14" y="72" class="stage-sub">REQUIRED · ANCILLARY · UNRELATED</text>
      </g>
      <!-- S4B -->
      <g transform="translate(768,0)">
        <rect width="180" height="80" rx="10" fill="#141a36" stroke="#2a345e"/>
        <text x="14" y="22" class="stage-tag llm-tag">stage 4b · llm</text>
        <text x="14" y="42" class="stage-title">Test ↔ intent</text>
        <text x="14" y="58" class="stage-sub">test + assertion verdicts:</text>
        <text x="14" y="72" class="stage-sub">ALIGNED · ON_TOPIC · OFF_TOPIC</text>
      </g>
      <!-- S4C -->
      <g transform="translate(960,0)">
        <rect width="180" height="80" rx="10" fill="#141a36" stroke="#2a345e"/>
        <text x="14" y="22" class="stage-tag det-tag">stage 4c · det</text>
        <text x="14" y="42" class="stage-title">Cross-reference</text>
        <text x="14" y="58" class="stage-sub">tests ↔ UNRELATED hunks</text>
        <text x="14" y="72" class="stage-sub">overpatch-overtest coupling</text>
      </g>
    </g>

    <g transform="translate(20,162)">
      <!-- S5 -->
      <g transform="translate(96,0)">
        <rect width="380" height="68" rx="10" fill="#141a36" stroke="#2a345e"/>
        <text x="14" y="22" class="stage-tag llm-tag">stage 5 · llm (schema-enforced)</text>
        <text x="14" y="42" class="stage-title">Dual-taxonomy classification</text>
        <text x="14" y="60" class="stage-sub">7 binary labels · cite-or-shut-up evidence rule · TaskLabelItem[]</text>
      </g>
      <!-- S6 -->
      <g transform="translate(496,0)">
        <rect width="380" height="68" rx="10" fill="#141a36" stroke="#2a345e"/>
        <text x="14" y="22" class="stage-tag det-tag">stage 6 · det · set membership</text>
        <text x="14" y="42" class="stage-title">Severity bucket + report build</text>
        <text x="14" y="60" class="stage-sub">CLEAN · MINOR · MODERATE · SEVERE · no thresholds, no weights</text>
      </g>
    </g>
  </g>

  <!-- Axis 2 band -->
  <g transform="translate(32,376)">
    <rect width="816" height="172" rx="14" fill="url(#axis2Grad)" stroke="#3d2a3c"/>
    <text x="20" y="32" class="axis-label">Axis 2 · Agent trajectory</text>
    <text x="20" y="50" class="stage-sub">Input: TrajectoryRecord per (task, agent) — Docent · HuggingFace · JSONL · JSON directory</text>

    <g transform="translate(20,70)">
      <g transform="translate(0,0)">
        <rect width="240" height="80" rx="10" fill="#1d1426" stroke="#3d2a3c"/>
        <text x="14" y="22" class="stage-tag det-tag">heuristics · det</text>
        <text x="14" y="42" class="stage-title">Gold-patch similarity</text>
        <text x="14" y="58" class="stage-sub">difflib normalised ratio</text>
        <text x="14" y="72" class="stage-sub">pip-install / F2P-name detection</text>
      </g>
      <g transform="translate(252,0)">
        <rect width="240" height="80" rx="10" fill="#1d1426" stroke="#3d2a3c"/>
        <text x="14" y="22" class="stage-tag llm-tag">classifier · llm</text>
        <text x="14" y="42" class="stage-title">Behavioural label</text>
        <text x="14" y="58" class="stage-sub">passed_genuine · passed_leak ·</text>
        <text x="14" y="72" class="stage-sub">test_aware · package_leak · …</text>
      </g>
      <g transform="translate(504,0)">
        <rect width="240" height="80" rx="10" fill="#1d1426" stroke="#3d2a3c"/>
        <text x="14" y="22" class="stage-tag det-tag">cross-agent · det</text>
        <text x="14" y="42" class="stage-title">Same-patch upgrade</text>
        <text x="14" y="58" class="stage-sub">≥2 agents on same task</text>
        <text x="14" y="72" class="stage-sub">all similar → upgrade to LEAK</text>
      </g>
    </g>
  </g>

  <!-- Stage 7 fusion -->
  <g transform="translate(880,376)">
    <rect width="368" height="172" rx="14" fill="url(#fuseGrad)" stroke="#2d6a4f"/>
    <text x="20" y="32" class="axis-label">Stage 7 · Fusion</text>
    <text x="20" y="50" class="stage-sub">deterministic — pure rule engine — no LLM</text>

    <g transform="translate(20,68)">
      <rect width="328" height="86" rx="10" fill="#0e2218" stroke="#2d6a4f"/>
      <text x="14" y="22" class="verdict-title">FairnessVerdict ∈ { … }</text>
      <text x="14" y="40" class="verdict-sub">FAIR_PASS · AGENT_CHEATED · CONTAMINATED_PASS</text>
      <text x="14" y="56" class="verdict-sub">AMBIGUOUS_PASS · UNFAIR_FAILURE · FAIR_FAILURE</text>
      <text x="14" y="72" class="verdict-sub">AGENT_DISENGAGED · INCONCLUSIVE   + invalidates_measurement</text>
    </g>
  </g>

  <!-- Arrows from axis bands to fusion -->
  <path class="arrow-line" d="M848 462 L876 462" marker-end="url(#arrow)"/>
  <path class="arrow-line" d="M640 356 L640 376 L880 376 L880 408 L876 408" marker-end="url(#arrow)" stroke-dasharray="0"/>

  <!-- Outputs -->
  <g transform="translate(32,572)">
    <rect width="1216" height="120" rx="14" fill="#0f1530" stroke="#22345e"/>
    <text x="20" y="32" class="axis-label">Outputs · evidence-grounded · reproducible from disk</text>

    <g transform="translate(20,52)">
      <g transform="translate(0,0)">
        <rect width="284" height="54" rx="10" fill="#141a36" stroke="#22345e"/>
        <text x="14" y="22" class="stage-title">reports/&lt;instance_id&gt;.json</text>
        <text x="14" y="40" class="stage-sub">ContaminationReport · labels · evidence · severity</text>
      </g>
      <g transform="translate(296,0)">
        <rect width="284" height="54" rx="10" fill="#141a36" stroke="#22345e"/>
        <text x="14" y="22" class="stage-title">summary.csv · summary_stats.json</text>
        <text x="14" y="40" class="stage-sub">aggregate counts · rebuilt from reports/</text>
      </g>
      <g transform="translate(592,0)">
        <rect width="284" height="54" rx="10" fill="#141a36" stroke="#22345e"/>
        <text x="14" y="22" class="stage-title">trajectory_analysis.{md, json}</text>
        <text x="14" y="40" class="stage-sub">per-agent labels · fusion verdicts</text>
      </g>
      <g transform="translate(888,0)">
        <rect width="308" height="54" rx="10" fill="#141a36" stroke="#22345e"/>
        <text x="14" y="22" class="stage-title">deep-dive forensic markdown</text>
        <text x="14" y="40" class="stage-sub">per-instance citations for human audit</text>
      </g>
    </g>
  </g>
</svg>
